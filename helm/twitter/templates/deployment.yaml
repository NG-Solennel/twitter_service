apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitter-service
  labels:
    app: twitter-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: twitter-service
  template:
    metadata:
      labels:
        app: twitter-service
    spec:
      containers:
        - name: twitter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /twitter?user_id=1&type=both&phrase=a&hashtag=a&timestamp=1
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /twitter?user_id=1&type=both&phrase=a&hashtag=a&timestamp=1
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: twitter-service
spec:
  selector:
    app: twitter-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
